<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 120px;

        }

        h1 {
            color: #2c3e50;

<body>
    <div class="box">
        <h1>Hi SRE Team 👋</h1>
        <p>It’s nice to meet you all!</p>

    </div>
