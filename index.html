<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foosball Welcome</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;

        /* Purple + black foosball vibe background */
        background: radial-gradient(circle at top, #2a003f, #000000 70%);
        overflow: hidden;
    }

    /* subtle foosball grid lines */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 2px,
            transparent 2px,
            transparent 60px
        );
        opacity: 0.2;
    }

    .box {
        position: relative;
        background: rgba(20, 0, 30, 0.85);
        border: 2px solid #a855f7;
        padding: 40px 50px;
        border-radius: 18px;
        text-align: center;
        max-width: 420px;

        box-shadow: 0 0 25px rgba(168, 85, 247, 0.4),
                    0 0 60px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
    }

    h1 {
        color: #c084fc;
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
    }

    p {
        color: #e5e5e5;
        font-size: 18px;
        line-height: 1.5;
    }

    .highlight {
        color: #f472b6;
        font-weight: bold;
        text-shadow: 0 0 8px rgba(244, 114, 182, 0.5);
    }

    /* foosball-style glowing ball */
    .ball {
        width: 14px;
        height: 14px;
        background: #a855f7;
        border-radius: 50%;
        position: absolute;
        top: -10px;
        right: -10px;
        box-shadow: 0 0 15px #a855f7;
        animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(10px); }
    }
</style>
</head>

<body>

<div class="box">
    <div class="ball"></div>
    <h1>Hi SRE Team 👋</h1>
    <p>It's great to meet you all</p>
    <p class="highlight">Let's play another foosball round.⚽</p>
</div>

</body>
</html>
